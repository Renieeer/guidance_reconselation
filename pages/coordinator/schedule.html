<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Guidance Management System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <div class="main-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Coordinator</h2>
                <p>Guidance System</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="bi bi-graph-up"></i> Dashboard</a></li>
                <li><a href="referrals.html"><i class="bi bi-clipboard-data"></i> Referrals</a></li>
                <li><a href="report-case.html"><i class="bi bi-pencil-square"></i> Report Case</a></li>
                <li><a href="account.html"><i class="bi bi-person-circle"></i> Account</a></li>
                <li><a href="schedule.html" class="active"><i class="bi bi-calendar3"></i> Schedule</a></li>
                <li><a href="feedback.html"><i class="bi bi-chat-dots"></i> Feedback</a></li>
                <li><a href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <div class="topbar">
                <div class="topbar-left">
                    <h1>Schedule Management</h1>
                </div>
                <div class="topbar-right">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">CJ</div>
                        <div>
                            <div class="fw-bold" id="userName">Coordinator</div>
                            <small class="text-muted">Coordinator</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Page Content -->
            <div class="page-content">
                <!-- Add Event Form -->
                <div class="card mb-5">
                    <h2 class="card-title mb-4">Create Schedule Event</h2>
                    
                    <form id="scheduleForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventTitle">Event Title *</label>
                                <input type="text" id="eventTitle" name="eventTitle" placeholder="e.g., Counseling Session" required>
                            </div>
                            <div class="form-group">
                                <label for="eventType">Event Type *</label>
                                <select id="eventType" name="eventType" required>
                                    <option value="">Select Type</option>
                                    <option value="Meeting">Meeting</option>
                                    <option value="Training">Training</option>
                                    <option value="Event">Event</option>
                                    <option value="Review">Case Review</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="eventDate">Date *</label>
                                <input type="date" id="eventDate" name="eventDate" required>
                            </div>
                            <div class="form-group">
                                <label for="eventTime">Time *</label>
                                <input type="time" id="eventTime" name="eventTime" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="eventDescription">Description</label>
                            <textarea id="eventDescription" name="eventDescription" placeholder="Event details..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="eventLocation">Location</label>
                            <input type="text" id="eventLocation" name="eventLocation" placeholder="e.g., Guidance Office">
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success">Add Event</button>
                            <button type="reset" class="btn btn-secondary">Clear</button>
                        </div>
                    </form>
                </div>

                <!-- Schedule Table -->
                <div class="table-container">
                    <h2 class="mb-4">Upcoming Events</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Event Title</th>
                                <th>Type</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Location</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleTableBody">
                            <tr>
                                <td colspan="6" class="text-center p-5 text-muted">No scheduled events yet</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="schedule.js"></script>
</body>
</html>
