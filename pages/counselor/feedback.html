<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Guidance Management System</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    <div class="main-wrapper">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>Counselor</h2>
                <p>Guidance System</p>
            </div>
            <ul class="sidebar-menu">
                <li><a href="dashboard.html"><i class="bi bi-graph-up"></i> Dashboard</a></li>
                <li><a href="analytics.html"><i class="bi bi-bar-chart"></i> Analytics</a></li>
                <li><a href="report-case.html"><i class="bi bi-pencil-square"></i> Report Case</a></li>
                <li><a href="student-record.html"><i class="bi bi-people"></i> Student Records</a></li>
                <li><a href="referral-status.html"><i class="bi bi-clipboard-data"></i> Referral Status</a></li>
                <li><a href="schedule.html"><i class="bi bi-calendar3"></i> Schedule</a></li>
                <li><a href="feedback.html" class="active"><i class="bi bi-chat-dots"></i> Feedback</a></li>
                <li><a href="#" id="logoutBtn"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Topbar -->
            <div class="topbar">
                <div class="topbar-left">
                    <h1>Feedback Management</h1>
                </div>
                <div class="topbar-right">
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">CM</div>
                        <div>
                            <div class="fw-bold" id="userName">Counselor</div>
                            <small class="text-muted">Counselor</small>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Page Content -->
            <div class="page-content">
                <!-- Submit Feedback Form -->
                <div class="card mb-5">
                    <h2 class="card-title mb-4">Submit Feedback</h2>
                    
                    <form id="feedbackForm">
                        <div class="form-group">
                            <label for="feedbackType">Feedback Type *</label>
                            <select id="feedbackType" name="feedbackType" required>
                                <option value="">Select Type</option>
                                <option value="Suggestion">Suggestion</option>
                                <option value="Issue">Issue/Problem</option>
                                <option value="Improvement">Area for Improvement</option>
                                <option value="Appreciation">Appreciation/Commendation</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="feedbackTitle">Title *</label>
                            <input type="text" id="feedbackTitle" name="feedbackTitle" placeholder="Brief title" required>
                        </div>

                        <div class="form-group">
                            <label for="feedbackMessage">Message *</label>
                            <textarea id="feedbackMessage" name="feedbackMessage" placeholder="Provide your feedback..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="anonymousFeedback" name="anonymousFeedback">
                                Submit anonymously
                            </label>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success">Submit Feedback</button>
                            <button type="reset" class="btn btn-secondary">Clear</button>
                        </div>
                    </form>
                </div>

                <!-- Feedback History -->
                <div class="table-container">
                    <h2 class="mb-4">Your Feedback Submissions</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="feedbackTableBody">
                            <tr>
                                <td colspan="5" class="text-center p-5 text-muted">No feedback submitted yet</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/auth.js"></script>
    <script src="../../js/utils.js"></script>
    <script src="feedback.js"></script>
</body>
</html>
